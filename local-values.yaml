# Must match kube-prometheus-stack service name (see: kubectl -n monitoring get svc).
global:
  prometheusURL: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"

clusterAgent:
  enabled: true

mlService:
  enabled: false

hub:
  enabled: false

cluster-agent:
  image:
    repository: optipilot-manager
    tag: local
    pullPolicy: Never
