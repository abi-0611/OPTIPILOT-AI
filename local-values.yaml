# Local / dev — overrides production-strict defaults from helm/optipilot/values.yaml
# (chart defaults: requirePrometheus=true, requireMLForecast=true).
global:
  prometheusURL: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"

clusterAgent:
  enabled: true
  # Images built locally and loaded into kind: docker build + kind load docker-image
  image:
    repository: ghcr.io/optipilot-ai/optipilot/manager
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  args:
    optimizerInterval: "20s"
    forecastLookback: "90m"
    forecastStep: "1m"
    forecastMinPoints: "6"
    # Same as chart production defaults (explicit):
    requirePrometheus: true
    requireMLForecast: true
    # Relaxed dev only (not for production):
    # requirePrometheus: false
    # requireMLForecast: false
    # Predictive ML (enable only when the ml-service pod is Ready):
    # mlServiceURL: "http://optipilot-ml-service.optipilot-system.svc.cluster.local:8080"
    autoDiscoverMLService: true

mlService:
  enabled: true
  image:
    repository: ghcr.io/optipilot-ai/optipilot/ml
    tag: "0.1.0"
    pullPolicy: IfNotPresent

hub:
  enabled: false
