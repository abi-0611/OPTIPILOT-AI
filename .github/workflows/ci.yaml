name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Generate deepcopy code
        run: make generate

      - name: Generate CRD manifests
        run: make manifests

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.0

      - name: Unit Tests
        run: make test

      - name: Build manager binary
        run: make build

      - name: Build Docker image
        run: make docker-build IMG=optipilot:ci

      - name: Helm structural tests
        run: go test ./test/helm/... -v
