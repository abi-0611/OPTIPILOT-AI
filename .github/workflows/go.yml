name: Go CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Test (exclude envtest controller + e2e)
        run: |
          pkgs=$(go list ./... | grep -v '/internal/controller$' | grep -v '/test/e2e$')
          go test -count=1 -race $pkgs
          go test -count=1 -race ./internal/controller -run '^Test(Deployment|Heuristic|AttachForecast)'

      - name: Build manager
        run: go build -o /tmp/manager ./cmd/manager
