kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: optimizationpolicies.policy.optipilot.ai
spec:
  group: policy.optipilot.ai
  names:
    kind: OptimizationPolicy
    listKind: OptimizationPolicyList
    plural: optimizationpolicies
    shortNames:
    - opol
    singular: optimizationpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.dryRun
      name: DryRun
      type: boolean
    - jsonPath: .spec.priority
      name: Priority
      type: integer
    - jsonPath: .status.matchedServices
      name: Matched
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: OptimizationPolicy is the Schema for the optimizationpolicies
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: OptimizationPolicySpec defines the desired state of OptimizationPolicy
            properties:
              constraints:
                description: Constraints are CEL expressions that candidate plans
                  must satisfy
                items:
                  description: PolicyConstraint defines a CEL expression constraint
                    on candidate plans
                  properties:
                    expr:
                      description: |-
                        Expr is a CEL expression evaluated against the decision context.
                        Must return a boolean.
                      type: string
                    hard:
                      default: true
                      description: |-
                        Hard when true means violation rejects the candidate entirely.
                        When false, violation adds a penalty to the candidate's score.
                      type: boolean
                    reason:
                      description: Reason is a human-readable explanation shown when
                        this constraint blocks a candidate
                      type: string
                  required:
                  - expr
                  - reason
                  type: object
                type: array
              dryRun:
                default: false
                description: DryRun when true logs decisions without actuating them
                type: boolean
              objectives:
                description: Objectives defines optimization objectives with weights
                items:
                  description: PolicyObjective defines a single optimization objective
                    with weight and direction
                  properties:
                    direction:
                      description: 'Direction: minimize (cost, carbon) or maximize
                        (slo_compliance, fairness)'
                      enum:
                      - minimize
                      - maximize
                      type: string
                    name:
                      description: Name of the objective (e.g., "cost", "slo_compliance",
                        "carbon", "fairness")
                      type: string
                    weight:
                      description: |-
                        Weight is the relative importance (all weights are normalized at runtime).
                        Value must be between 0 and 1 inclusive.
                      type: number
                  required:
                  - direction
                  - name
                  - weight
                  type: object
                minItems: 1
                type: array
              priority:
                default: 100
                description: Priority determines precedence when multiple policies
                  match (higher wins)
                format: int32
                maximum: 1000
                minimum: 0
                type: integer
              scalingBehavior:
                description: ScalingBehavior controls the rate and safety of scaling
                  actions
                properties:
                  scaleDown:
                    description: ScalingRule defines a per-direction rate limit for
                      scaling
                    properties:
                      cooldownSeconds:
                        default: 60
                        description: CooldownSeconds is the minimum time between scaling
                          actions
                        format: int32
                        minimum: 0
                        type: integer
                      maxPercent:
                        default: 100
                        description: MaxPercent is the maximum percentage change per
                          scaling cycle
                        format: int32
                        maximum: 500
                        minimum: 1
                        type: integer
                    type: object
                  scaleUp:
                    description: ScalingRule defines a per-direction rate limit for
                      scaling
                    properties:
                      cooldownSeconds:
                        default: 60
                        description: CooldownSeconds is the minimum time between scaling
                          actions
                        format: int32
                        minimum: 0
                        type: integer
                      maxPercent:
                        default: 100
                        description: MaxPercent is the maximum percentage change per
                          scaling cycle
                        format: int32
                        maximum: 500
                        minimum: 1
                        type: integer
                    type: object
                type: object
              selector:
                description: Selector determines which ServiceObjectives this policy
                  applies to
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - objectives
            type: object
          status:
            description: OptimizationPolicyStatus defines the observed state of OptimizationPolicy
            properties:
              celCompilationStatus:
                description: CELCompilationStatus indicates whether all constraints
                  compiled successfully
                type: string
              conditions:
                description: Conditions represent the latest available observations
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              matchedServices:
                description: MatchedServices is the count of ServiceObjectives this
                  policy matches
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
