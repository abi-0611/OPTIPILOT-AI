---
apiVersion: policy.optipilot.ai/v1alpha1
kind: OptimizationPolicy
metadata:
  name: codepro-api-policy
  namespace: codepro
spec:
  selector:
    matchLabels:
      tier: codepro
  objectives:
    - name: slo_compliance
      weight: 0.8
      direction: maximize
    - name: cost
      weight: 0.15
      direction: minimize
    - name: carbon
      weight: 0.05
      direction: minimize
  constraints:
    - expr: "candidate.replicas >= 1"
      reason: "Always keep at least 1 replica"
      hard: true
    - expr: "candidate.replicas <= 10"
      reason: "Cap at 10 replicas"
      hard: true
  scalingBehavior:
    scaleUp:
      maxPercent: 100
      cooldownSeconds: 60
    scaleDown:
      maxPercent: 20
      cooldownSeconds: 120
  dryRun: false
  priority: 100
