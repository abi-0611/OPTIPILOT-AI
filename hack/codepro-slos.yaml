apiVersion: slo.optipilot.ai/v1alpha1
kind: ServiceObjective
metadata:
  name: codepro-admin-frontend-slo
  namespace: codepro
  labels:
    tier: codepro
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: admin-frontend
  objectives:
    - metric: custom
      customQuery: 'kube_deployment_status_replicas_available{namespace="codepro",deployment="admin-frontend"} / kube_deployment_spec_replicas{namespace="codepro",deployment="admin-frontend"}'
      target: "99.0%"
      window: "5m"
