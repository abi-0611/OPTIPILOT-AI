apiVersion: slo.optipilot.ai/v1alpha1
kind: ServiceObjective
metadata:
  name: codepro-api-slo
  namespace: codepro
  labels:
    tier: codepro
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  objectives:
    - metric: custom
      customQuery: 'kube_deployment_status_replicas_available{namespace="codepro",deployment="api"} / kube_deployment_spec_replicas{namespace="codepro",deployment="api"}'
      target: "99.9%"
      window: "5m"
    - metric: custom
      customQuery: 'kube_deployment_status_replicas_available{namespace="codepro",deployment="api"}'
      target: "1"
      window: "5m"
  errorBudget:
    total: "0.1%"
    burnRateAlerts:
      - severity: warning
        shortWindow: "5m"
        longWindow: "1h"
        factor: 14.4
  evaluationInterval: "30s"
---
