---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: tenantprofiles.tenant.optipilot.ai
spec:
  group: tenant.optipilot.ai
  names:
    kind: TenantProfile
    listKind: TenantProfileList
    plural: tenantprofiles
    shortNames:
    - tp
    singular: tenantprofile
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.tier
      name: Tier
      type: string
    - jsonPath: .spec.weight
      name: Weight
      type: integer
    - jsonPath: .status.currentCostUSD
      name: Cost
      type: string
    - jsonPath: .status.fairnessScore
      name: Fairness
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TenantProfile is the Schema for the tenantprofiles API.
          TenantProfile is cluster-scoped because a single tenant can span multiple namespaces.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TenantProfileSpec defines the desired state of TenantProfile
            properties:
              budgets:
                description: Budgets defines hard resource and cost limits
                properties:
                  maxCores:
                    description: MaxCores is the maximum CPU cores across all namespaces
                    format: int32
                    type: integer
                  maxGPUs:
                    description: MaxGPUs is the maximum GPU count across all namespaces
                    format: int32
                    type: integer
                  maxMemoryGiB:
                    description: MaxMemoryGiB is the maximum memory in GiB across
                      all namespaces
                    format: int32
                    type: integer
                  maxMonthlyCostUSD:
                    description: MaxMonthlyCostUSD is the hard monthly cost ceiling
                    type: string
                type: object
              fairSharePolicy:
                description: FairSharePolicy defines guaranteed and burst allocation
                  parameters
                properties:
                  burstable:
                    default: true
                    description: Burstable allows this tenant to use more than guaranteed
                      share when available
                    type: boolean
                  guaranteedCoresPercent:
                    description: GuaranteedCoresPercent is the minimum percentage
                      of cluster CPU guaranteed
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  maxBurstPercent:
                    description: MaxBurstPercent is the maximum percentage of cluster
                      CPU when bursting
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                required:
                - guaranteedCoresPercent
                type: object
              namespaces:
                description: Namespaces lists the Kubernetes namespaces owned by this
                  tenant
                items:
                  type: string
                minItems: 1
                type: array
              tier:
                description: Tier determines the service level for this tenant
                enum:
                - platinum
                - gold
                - silver
                - bronze
                type: string
              weight:
                default: 10
                description: Weight is the relative priority weight for fair-share
                  allocation
                format: int32
                maximum: 1000
                minimum: 1
                type: integer
            required:
            - namespaces
            - tier
            type: object
          status:
            description: TenantProfileStatus defines the observed state of TenantProfile
            properties:
              allocationStatus:
                description: AllocationStatus indicates whether tenant is at, above,
                  or below guaranteed share
                enum:
                - guaranteed
                - bursting
                - throttled
                - under_allocated
                type: string
              conditions:
                description: Conditions represent the latest available observations
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentCores:
                description: CurrentCores is the current CPU cores in use
                format: int32
                type: integer
              currentCostUSD:
                description: CurrentCostUSD is the current month-to-date cost
                type: string
              currentMemoryGiB:
                description: CurrentMemoryGiB is the current memory in use
                format: int32
                type: integer
              fairnessScore:
                description: FairnessScore is this tenant's contribution to the global
                  Jain's index (0–1)
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
