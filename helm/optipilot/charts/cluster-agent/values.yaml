image:
  repository: ghcr.io/optipilot-ai/optipilot/manager
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

args:
  metricsBindAddress: ":8080"
  healthProbeBindAddress: ":8081"
  # Prometheus base URL for SLO + forecast history (overridden by global.prometheusURL when set).
  prometheusURL: ""
  leaderElect: true
  optimizerInterval: "20s"
  # Near–real-time forecast tuning (manager flags).
  forecastLookback: "90m"
  forecastStep: "1m"
  forecastMinPoints: "6"
  # OptiPilot ML HTTP service. If empty and autoDiscoverMLService is true, uses http://RELEASE-ml-service.NS.svc.cluster.local:8080
  mlServiceURL: ""
  autoDiscoverMLService: false
  # Exit on startup if Prometheus is down (set true in production for fail-fast).
  requirePrometheus: true
  # When --ml-service-url is set, exit if ML GET /v1/health is not OK.
  requireMLForecast: true
  journalPath: "/data/decisions.db"
  apiAddr: ":8090"
  hubEndpoint: ""
  clusterName: ""
  clusterProvider: ""
  clusterRegion: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

service:
  type: ClusterIP
  metricsPort: 8080
  dashboardPort: 8090

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /data

config:
  LOG_LEVEL: info
  OPTIMIZER_INTERVAL: "60s"

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
