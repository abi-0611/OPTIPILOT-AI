# Minimal HTTP stub so the manager passes --require-prometheus startup checks
# (GET /-/healthy + GET /api/v1/query_range for vector(1)).
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-stub-config
  namespace: optipilot-system
data:
  default.conf: |
    server {
      listen 9090;
      location /-/healthy {
        access_log off;
        default_type text/plain;
        return 200 'OK';
      }
      location /api/v1/query_range {
        default_type application/json;
        return 200 '{"status":"success","data":{"resultType":"matrix","result":[{"metric":{},"values":[[1700000000,"1"],[1700000060,"1"]]}]}}';
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-stub
  namespace: optipilot-system
  labels:
    app: prometheus-stub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-stub
  template:
    metadata:
      labels:
        app: prometheus-stub
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: cfg
              mountPath: /etc/nginx/conf.d
              readOnly: true
          readinessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
      volumes:
        - name: cfg
          configMap:
            name: prometheus-stub-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-stub
  namespace: optipilot-system
spec:
  selector:
    app: prometheus-stub
  ports:
    - name: http
      port: 9090
      targetPort: 9090
