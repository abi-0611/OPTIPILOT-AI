apiVersion: tenant.optipilot.ai/v1alpha1
kind: TenantProfile
metadata:
  name: codepro-tenant
spec:
  tier: gold
  weight: 10
  namespaces:
    - codepro
  budgets:
    maxMonthlyCostUSD: "5000"
    maxCores: 64
    maxMemoryGiB: 128
  fairSharePolicy:
    guaranteedCoresPercent: 20
    burstable: true
    maxBurstPercent: 40
