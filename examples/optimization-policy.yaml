apiVersion: policy.optipilot.ai/v1alpha1
kind: OptimizationPolicy
metadata:
  name: cost-sensitive
spec:
  selector:
    matchLabels:
      tier: non-critical
  objectives:
    - name: cost
      weight: 0.6
      direction: minimize
    - name: slo_compliance
      weight: 0.3
      direction: maximize
    - name: carbon
      weight: 0.1
      direction: minimize
  constraints:
    - expr: "candidate.spot_ratio <= 0.8"
      reason: "Max 80% spot for non-critical workloads"
      hard: true
    - expr: "candidate.replicas >= 2"
      reason: "Minimum 2 replicas always"
      hard: true
  scalingBehavior:
    scaleUp:
      maxPercent: 100
      cooldownSeconds: 60
    scaleDown:
      maxPercent: 20
      cooldownSeconds: 300
  dryRun: false
  priority: 100
