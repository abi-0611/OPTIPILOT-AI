---
apiVersion: policy.optipilot.ai/v1alpha1
kind: OptimizationPolicy
metadata:
  name: boutique-policy
  namespace: default
spec:
  selector:
    matchLabels:
      tier: boutique
  objectives:
    - name: slo_compliance
      weight: 0.8
      direction: maximize
    - name: cost
      weight: 0.15
      direction: minimize
    - name: carbon
      weight: 0.05
      direction: minimize
  constraints:
    - expr: "candidate.replicas >= 1"
      reason: "Always keep at least 1 replica"
      hard: true
    - expr: "candidate.replicas <= 10"
      reason: "Cap at 10 replicas"
      hard: true
  scalingBehavior:
    scaleUp:
      maxPercent: 100
      cooldownSeconds: 20
    scaleDown:
      maxPercent: 50
      cooldownSeconds: 35
  dryRun: false
  priority: 100
