# Online Boutique (Google microservices-demo) - ServiceObjectives + shared OptimizationPolicy
# Apply after: kubectl apply -f https://raw.githubusercontent.com/GoogleCloudPlatform/microservices-demo/main/release/kubernetes-manifests.yaml
# Namespace: default
#
# Labels: tier=boutique on every ServiceObjective so one OptimizationPolicy can match all.
# CPU headroom queries use (sum(...) or vector(0)) so scale-to-zero / no pods still returns a scalar.
#
# Demo tuning (more frequent scale/tune):
#   - Shorter evaluationInterval + stricter CPU headroom target = SLO flips more often under load.
#   - Shorter policy cooldowns = next scale/tune can fire sooner (noisier in production).
#   - Faster optimizer loop (Helm): clusterAgent.args.optimizerInterval: "10s"
#   - More RPS: . .\hack\boutique-heavy-load.ps1 ; Start-BoutiqueHeavyLoad -ParallelPods 12
#   - Optional: kubectl set env deploy/loadgenerator -n default USERS=40 RATE=3

apiVersion: slo.optipilot.ai/v1alpha1
kind: ServiceObjective
metadata:
  name: boutique-frontend-slo
  namespace: default
  labels:
    tier: boutique
    app: frontend
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  objectives:
    - metric: custom
      customQuery: 'kube_deployment_status_replicas_available{namespace="default",deployment="frontend"} / clamp_min(kube_deployment_spec_replicas{namespace="default",deployment="frontend"}, 1)'
      target: "99.5%"
      window: "5m"
    - metric: custom
      customQuery: '1 - clamp_max((sum(rate(container_cpu_usage_seconds_total{namespace="default",pod=~"frontend-.*",container!="",container!="POD"}[5m])) or vector(0)) / clamp_min((sum(kube_pod_container_resource_limits{namespace="default",pod=~"frontend-.*",resource="cpu"})) or vector(0.001), 0.001), 1)'
      target: "30%"
      window: "5m"
  errorBudget:
    total: "1.0%"
    burnRateAlerts:
      - severity: warning
        shortWindow: "5m"
        longWindow: "1h"
        factor: 14.4
  evaluationInterval: "15s"
---
