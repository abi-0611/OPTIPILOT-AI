apiVersion: tenant.optipilot.ai/v1alpha1
kind: TenantProfile
metadata:
  name: team-checkout
spec:
  tier: gold
  weight: 10
  namespaces:
    - ecommerce
    - ecommerce-staging
  budgets:
    maxMonthlyCostUSD: "5000"
    maxCores: 200
    maxMemoryGiB: 800
  fairSharePolicy:
    guaranteedCoresPercent: 15
    burstable: true
    maxBurstPercent: 30
